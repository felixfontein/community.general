- name: Test community.general.flattened
  ansible.builtin.set_fact:
    result: "{{ query('community.general.flattened', input) }}"
  vars:
    input:
      - - a__
      - - b__
        - - c__
          - d__

- name: Verify community.general.flattened results
  ansible.builtin.assert:
    that:
      - result == expected
  vars:
    expected:
      - a__
      - b__
      - c__
      - d__
