# Pre-test setup
- name: create a vpc
  community.general.hwc_network_vpc:
    cidr: "192.168.0.0/16"
    name: "ansible_network_vpc_test_local"
    state: present
  register: vpc1
- name: create a vpc
  community.general.hwc_network_vpc:
    cidr: "192.168.0.0/16"
    name: "ansible_network_vpc_test_peering"
    state: present
  register: vpc2
- name: create a peering connect
  community.general.hwc_vpc_peering_connect:
    local_vpc_id: "{{ vpc1.id }}"
    name: "ansible_network_peering_test"
    filters:
      - "name"
    peering_vpc:
      vpc_id: "{{ vpc2.id }}"
    state: present
  register: connect
- name: delete a route
  community.general.hwc_vpc_route:
    vpc_id: "{{ vpc1.id }}"
    destination: "192.168.0.0/16"
    next_hop: "{{ connect.id }}"
    state: absent
# ----------------------------------------------------------
- name: create a route (check mode)
  community.general.hwc_vpc_route:
    vpc_id: "{{ vpc1.id }}"
    destination: "192.168.0.0/16"
    next_hop: "{{ connect.id }}"
  check_mode: true
  register: result
- ansible.builtin.assert:
    that:
      - not result.id
      - result.changed
# ----------------------------------------------------------
- name: create a route
  community.general.hwc_vpc_route:
    vpc_id: "{{ vpc1.id }}"
    destination: "192.168.0.0/16"
    next_hop: "{{ connect.id }}"
    state: present
  register: result
- name: assert changed is true
  ansible.builtin.assert:
    that:
      result is changed
# ----------------------------------------------------------
- name: create a route (idemponent)
  community.general.hwc_vpc_route:
    vpc_id: "{{ vpc1.id }}"
    destination: "192.168.0.0/16"
    next_hop: "{{ connect.id }}"
    state: present
  check_mode: true
  register: result
- name: idemponent
  ansible.builtin.assert:
    that:
      - not result.changed
# -----------------------------------------------------------
- name: create a route that already exists
  community.general.hwc_vpc_route:
    vpc_id: "{{ vpc1.id }}"
    destination: "192.168.0.0/16"
    next_hop: "{{ connect.id }}"
    state: present
  register: result
- name: assert changed is false
  ansible.builtin.assert:
    that:
      - result is not failed
      - result is not changed
# ----------------------------------------------------------
- name: delete a route (check mode)
  community.general.hwc_vpc_route:
    vpc_id: "{{ vpc1.id }}"
    destination: "192.168.0.0/16"
    next_hop: "{{ connect.id }}"
    state: absent
  check_mode: true
# ----------------------------------------------------------
- name: delete a route
  community.general.hwc_vpc_route:
    vpc_id: "{{ vpc1.id }}"
    destination: "192.168.0.0/16"
    next_hop: "{{ connect.id }}"
    state: absent
  register: result
- name: assert changed is true
  ansible.builtin.assert:
    that:
      result is changed
# ----------------------------------------------------------
- name: delete a (idemponent)
  community.general.hwc_vpc_route:
    vpc_id: "{{ vpc1.id }}"
    destination: "192.168.0.0/16"
    next_hop: "{{ connect.id }}"
    state: absent
  check_mode: true
  register: result
- name: not changed
  ansible.builtin.assert:
    that:
      not result.changed
# ----------------------------------------------------------------------------
- name: delete a route that does not exist
  community.general.hwc_vpc_route:
    vpc_id: "{{ vpc1.id }}"
    destination: "192.168.0.0/16"
    next_hop: "{{ connect.id }}"
    state: absent
  register: result
- name: assert changed is false
  ansible.builtin.assert:
    that:
      - result is not failed
      - result is not changed
# ---------------------------------------------------------
# Post-test teardown
- name: delete a peering connect
  community.general.hwc_vpc_peering_connect:
    local_vpc_id: "{{ vpc1.id }}"
    name: "ansible_network_peering_test"
    filters:
      - "name"
    peering_vpc:
      vpc_id: "{{ vpc2.id }}"
    state: absent
  register: connect
- name: delete a vpc
  community.general.hwc_network_vpc:
    cidr: "192.168.0.0/16"
    name: "ansible_network_vpc_test_peering"
    state: absent
  register: vpc2
- name: delete a vpc
  community.general.hwc_network_vpc:
    cidr: "192.168.0.0/16"
    name: "ansible_network_vpc_test_local"
    state: absent
  register: vpc1
