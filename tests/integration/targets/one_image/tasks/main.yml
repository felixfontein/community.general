# Checks for existence
- name: Make sure image is present by ID
  community.general.one_image:
    api_url: "{{ opennebula_url }}"
    api_username: "{{ opennebula_username }}"
    api_password: "{{ opennebula_password }}"
    id: 0
    state: present
  register: result

- name: Assert that image is present
  ansible.builtin.assert:
    that:
      - result is not changed

- name: Make sure image is present by ID
  community.general.one_image:
    api_url: "{{ opennebula_url }}"
    api_username: "{{ opennebula_username }}"
    api_password: "{{ opennebula_password }}"
    name: my_image
    state: present
  register: result

- name: Assert that image is present
  ansible.builtin.assert:
    that:
      - result is not changed

# Updating an image
- name: Clone image without name
  community.general.one_image:
    api_url: "{{ opennebula_url }}"
    api_username: "{{ opennebula_username }}"
    api_password: "{{ opennebula_password }}"
    id: 0
    state: cloned
  register: result

- name: Assert that image is cloned
  ansible.builtin.assert:
    that:
      - result is changed

- name: Clone image with name
  community.general.one_image:
    api_url: "{{ opennebula_url }}"
    api_username: "{{ opennebula_username }}"
    api_password: "{{ opennebula_password }}"
    id: 0
    state: renamed
    new_name: new_image
  register: result

- name: Assert that image is cloned
  ansible.builtin.assert:
    that:
      - result is changed

- name: Disable image
  community.general.one_image:
    api_url: "{{ opennebula_url }}"
    api_username: "{{ opennebula_username }}"
    api_password: "{{ opennebula_password }}"
    id: 0
    enabled: false
  register: result

- name: Assert that network is disabled
  ansible.builtin.assert:
    that:
      - result is changed

- name: Enable image
  community.general.one_image:
    api_url: "{{ opennebula_url }}"
    api_username: "{{ opennebula_username }}"
    api_password: "{{ opennebula_password }}"
    id: 0
    enabled: true
  register: result

- name: Assert that network is enabled
  ansible.builtin.assert:
    that:
      - result is changed

- name: Make image persistent
  community.general.one_image:
    api_url: "{{ opennebula_url }}"
    api_username: "{{ opennebula_username }}"
    api_password: "{{ opennebula_password }}"
    id: 0
    persistent: true
  register: result

- name: Assert that network is persistent
  ansible.builtin.assert:
    that:
      - result is changed

- name: Make image non-persistent
  community.general.one_image:
    api_url: "{{ opennebula_url }}"
    api_username: "{{ opennebula_username }}"
    api_password: "{{ opennebula_password }}"
    id: 0
    persistent: false
  register: result

- name: Assert that network is non-persistent
  ansible.builtin.assert:
    that:
      - result is changed

# Testing idempotence using the same tasks
- name: Make image non-persistent
  community.general.one_image:
    api_url: "{{ opennebula_url }}"
    api_username: "{{ opennebula_username }}"
    api_password: "{{ opennebula_password }}"
    id: 0
    persistent: false
    enabled: true
  register: result

- name: Assert that network not changed
  ansible.builtin.assert:
    that:
      - result is not changed

# Delete images
- name: Deleting non-existing image
  community.general.one_image:
    api_url: "{{ opennebula_url }}"
    api_username: "{{ opennebula_username }}"
    api_password: "{{ opennebula_password }}"
    id: 228
    state: absent
  register: result

- name: Assert that network not changed
  ansible.builtin.assert:
    that:
      - result is not changed

- name: Delete an existing image
  community.general.one_image:
    api_url: "{{ opennebula_url }}"
    api_username: "{{ opennebula_username }}"
    api_password: "{{ opennebula_password }}"
    id: 0
    state: absent
  register: result

- name: Assert that image was deleted
  ansible.builtin.assert:
    that:
      - result is changed

# Trying to run with wrong arguments
- name: Try to use name and ID at the same time
  community.general.one_image:
    api_url: "{{ opennebula_url }}"
    api_username: "{{ opennebula_username }}"
    api_password: "{{ opennebula_password }}"
    id: 0
    name: name
  register: result
  ignore_errors: true

- name: Assert that task failed
  ansible.builtin.assert:
    that:
      - result is failed

- name: Try to rename image without specifying new name
  community.general.one_image:
    api_url: "{{ opennebula_url }}"
    api_username: "{{ opennebula_username }}"
    api_password: "{{ opennebula_password }}"
    id: 0
    state: rename
  register: result
  ignore_errors: true

- name: Assert that task failed
  ansible.builtin.assert:
    that:
      - result is failed

- name: Try to rename image without specifying new name
  community.general.one_image:
    api_url: "{{ opennebula_url }}"
    api_username: "{{ opennebula_username }}"
    api_password: "{{ opennebula_password }}"
    id: 0
    state: rename
  register: result
  ignore_errors: true
