- name: Install Consul and test
  vars:
    consul_version: 1.22.6
    consul_uri: https://releases.hashicorp.com/consul/{{ consul_version }}/consul_{{ consul_version }}_{{ ansible_facts.system | lower }}_{{ consul_arch }}.zip
    consul_cmd: '{{ remote_tmp_dir }}/consul'
  block:
    - name: Install py-consul
      ansible.builtin.pip:
        name: py-consul
        extra_args: "-c {{ remote_constraints }}"
      register: result
      retries: 3
      delay: 5
      until: result is success
    - name: Generate privatekey
      community.crypto.openssl_privatekey:
        path: '{{ remote_tmp_dir }}/privatekey.pem'
    - name: Generate CSR
      community.crypto.openssl_csr:
        path: '{{ remote_tmp_dir }}/csr.csr'
        privatekey_path: '{{ remote_tmp_dir }}/privatekey.pem'
        subject:
          commonName: localhost
    - name: Generate selfsigned certificate
      register: selfsigned_certificate
      community.crypto.x509_certificate:
        path: '{{ remote_tmp_dir }}/cert.pem'
        csr_path: '{{ remote_tmp_dir }}/csr.csr'
        privatekey_path: '{{ remote_tmp_dir }}/privatekey.pem'
        provider: selfsigned
        selfsigned_digest: sha256
    - name: Install unzip
      ansible.builtin.package:
        name: unzip
      register: result
      until: result is success
      when: ansible_facts.distribution != "MacOSX"
    - ansible.builtin.assert:
        that: ansible_facts.architecture in ['i386', 'x86_64', 'amd64', 'arm64', 'aarch64']
    - ansible.builtin.set_fact:
        consul_arch: '386'
      when: ansible_facts.architecture == 'i386'
    - ansible.builtin.set_fact:
        consul_arch: amd64
      when: ansible_facts.architecture in ['x86_64', 'amd64']
    - ansible.builtin.set_fact:
        consul_arch: arm64
      when: ansible_facts.architecture in ['arm64', 'aarch64']
    - name: Download consul binary
      ansible.builtin.unarchive:
        src: '{{ consul_uri }}'
        dest: '{{ remote_tmp_dir }}'
        remote_src: true
      register: result
      until: result is success
    - name: Remove macOS quarantine attribute from consul binary
      ansible.builtin.command: xattr -d com.apple.quarantine {{ consul_cmd }}
      when: ansible_facts.system == 'Darwin'
      ignore_errors: true
    - vars:
        remote_dir: '{{ echo_remote_tmp_dir.stdout }}'
      block:
        - ansible.builtin.command: echo {{ remote_tmp_dir }}
          register: echo_remote_tmp_dir
        - name: Create configuration file
          ansible.builtin.template:
            src: consul_config.hcl.j2
            dest: '{{ remote_tmp_dir }}/consul_config.hcl'
        - name: Start Consul (dev mode enabled)
          ansible.builtin.shell: nohup {{ consul_cmd }} agent -dev -config-file {{ remote_tmp_dir }}/consul_config.hcl </dev/null >/dev/null 2>&1 &
        - name: Wait for Consul HTTP API to be ready
          ansible.builtin.wait_for:
            host: localhost
            port: 8500
            delay: 3
            timeout: 60
        - name: Bootstrap ACL
          community.general.consul_acl_bootstrap:
          register: consul_bootstrap_result
        - ansible.builtin.set_fact:
            consul_management_token: '{{ consul_bootstrap_result.result.SecretID }}'
        - name: Create some data
          ansible.builtin.command: '{{ consul_cmd }} kv put -token={{consul_management_token}} data/value{{ item }} foo{{ item }}'
          loop:
            - 1
            - 2
            - 3
        - ansible.builtin.import_tasks: consul_general.yml
        - ansible.builtin.import_tasks: consul_kv.yml

        - block:
            - ansible.builtin.import_tasks: consul_session.yml
            - ansible.builtin.import_tasks: consul_policy.yml
            - ansible.builtin.import_tasks: consul_role.yml
            - ansible.builtin.import_tasks: consul_token.yml
            - ansible.builtin.import_tasks: consul_auth_method.yml
            - ansible.builtin.import_tasks: consul_binding_rule.yml
            - ansible.builtin.import_tasks: consul_agent_service.yml
            - ansible.builtin.import_tasks: consul_agent_check.yml
          module_defaults:
            group/community.general.consul:
              token: "{{ consul_management_token }}"

  always:
    - name: Kill consul process
      ansible.builtin.shell: kill $(cat {{ remote_tmp_dir }}/consul.pid)
      ignore_errors: true
