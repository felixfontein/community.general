- name: ensure iptables package is installed (non-RHEL)
  ansible.builtin.package:
    name:
      - iptables
  become: true
  when: not (ansible_facts.distribution == 'RedHat' and ansible_facts.distribution_major_version|int >= 10)

- name: ensure iptables package is installed (RHEL 10+)
  ansible.builtin.package:
    name:
      - "kernel-modules-extra-matched-{{ ansible_facts.kernel }}"
      - "iptables-nft"
      - "kernel-modules-extra-{{ ansible_facts.kernel }}"
  become: true
  when: ansible_facts.distribution == 'RedHat' and ansible_facts.distribution_major_version|int >= 10

- name: include tasks
  vars:
    iptables_saved: "/tmp/test_iptables_state.saved"
    iptables_tests: "/tmp/test_iptables_state.tests"

  block:
    - name: include tasks to perform basic tests (check_mode, async, idempotency)
      ansible.builtin.include_tasks: tests/00-basic.yml

    - name: include tasks to test tables handling
      ansible.builtin.include_tasks: tests/01-tables.yml
      when:
        - xtables_lock is undefined

    - name: include tasks to test partial restore files
      ansible.builtin.include_tasks: tests/02-partial-restore.yml
      when:
        - xtables_lock is undefined


    - name: include tasks to test rollbacks
      ansible.builtin.include_tasks: tests/10-rollback.yml
      when:
        - xtables_lock is undefined
        - ansible_connection in ['ssh', 'paramiko', 'smart']

  become: true
