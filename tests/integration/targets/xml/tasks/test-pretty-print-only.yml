- name: Setup test fixture
  ansible.builtin.copy:
    src: fixtures/ansible-xml-beers.xml
    dest: /tmp/ansible-xml-beers.xml.orig

- name: Remove spaces from test fixture
  ansible.builtin.shell: sed 's/^[ ]*//g' < /tmp/ansible-xml-beers.xml.orig > /tmp/ansible-xml-beers.xml

- name: Pretty print without modification
  community.general.xml:
    path: /tmp/ansible-xml-beers.xml
    pretty_print: true
  register: pretty_print_only

- name: Compare to expected result
  ansible.builtin.copy:
    src: results/test-pretty-print-only.xml
    dest: /tmp/ansible-xml-beers.xml
  check_mode: true
  diff: true
  register: comparison

- name: Test expected result
  ansible.builtin.assert:
    that:
      - pretty_print_only is changed
      - comparison is not changed  # identical
  # ansible.builtin.command: diff -u {{ role_path }}/results/test-pretty-print-only.xml /tmp/ansible-xml-beers.xml
