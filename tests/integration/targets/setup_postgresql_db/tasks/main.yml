# Exit when Suse because it causes CI problems
- ansible.builtin.meta: end_play
  when: ansible_facts.os_family == 'Suse'

# To avoid hangings on service start/stop postgres during CI runs:
- ansible.builtin.meta: end_play
  when: ansible_facts.distribution == 'CentOS' and ansible_facts.distribution_major_version == '8'

# Temporary disable Fedora 34
- ansible.builtin.meta: end_play
  when: ansible_facts.distribution == 'Fedora' and ansible_facts.distribution_major_version == '34'

# Temporary disable Fedora 44
- ansible.builtin.meta: end_play
  when: ansible_facts.distribution == 'Fedora' and ansible_facts.distribution_major_version == '44'

- name: Include distribution and Python version specific variables
  ansible.builtin.include_vars: '{{ lookup(''first_found'', params) }}'
  vars:
    params:
      files:
        - '{{ ansible_facts.distribution }}-{{ ansible_facts.distribution_major_version }}.yml'
        - '{{ ansible_facts.distribution }}-{{ ansible_facts.distribution_version }}.yml'
        - '{{ ansible_facts.os_family }}.yml'
        - default.yml
      paths:
        - '{{ role_path }}/vars'

- name: make sure the dbus service is started under systemd
  ansible.builtin.systemd:
    name: dbus
    state: started
  when: ansible_facts.service_mgr == 'systemd' and ansible_facts.distribution == 'Fedora'

- name: Kill all postgres processes
  ansible.builtin.shell: 'pkill -u {{ pg_user }}'
  become: true
  when: ansible_facts.distribution == 'CentOS' and ansible_facts.distribution_major_version == '8'
  ignore_errors: true

- name: stop postgresql service
  ansible.builtin.service: name={{ postgresql_service }} state=stopped
  ignore_errors: true

- name: remove old db (RedHat or Suse)
  ansible.builtin.file:
    path: '{{ pg_dir }}'
    state: absent
  ignore_errors: true
  when: ansible_facts.os_family == "RedHat" or ansible_facts.os_family == "Suse"

- name: remove old db (FreeBSD)
  ansible.builtin.file:
    path: '{{ pg_dir }}'
    state: absent
  ignore_errors: true
  when: ansible_facts.os_family == "FreeBSD"

- name: remove old db config and files (debian)
  ansible.builtin.file:
    path: '{{ loop_item }}'
    state: absent
  ignore_errors: true
  when: ansible_facts.os_family == "Debian"
  loop:
    - /etc/postgresql
    - /var/lib/postgresql
  loop_control:
    loop_var: loop_item

- name: install dependencies for postgresql test
  ansible.builtin.package:
    name: '{{ postgresql_package_item }}'
    state: present
  with_items: '{{ postgresql_packages }}'
  loop_control:
    loop_var: postgresql_package_item

- name: initialize postgres (FreeBSD)
  ansible.builtin.command: /usr/local/etc/rc.d/postgresql oneinitdb
  when: ansible_facts.os_family == "FreeBSD"

- name: Initialize postgres (RedHat systemd)
  ansible.builtin.command: postgresql-setup initdb
  when: ansible_facts.os_family == "RedHat" and ansible_facts.service_mgr == "systemd"

- name: Initialize postgres (RedHat sysv)
  ansible.builtin.command: /sbin/service postgresql initdb
  when: ansible_facts.os_family == "RedHat" and ansible_facts.service_mgr != "systemd"

- name: Initialize postgres (Archlinux)
  ansible.builtin.command: su - postgres -c "initdb --locale en_US.UTF-8 -D '/var/lib/postgres/data'"
  args:
    creates: /var/lib/postgres/data/PG_VERSION
  when: ansible_facts.os_family == "Archlinux"

- name: Initialize postgres (Alpine)
  ansible.builtin.command: su - postgres -c "initdb --locale en_US.UTF-8 -D '/var/lib/postgresql/data'"
  when: ansible_facts.os_family == "Alpine"

- name: Initialize postgres (Debian)
  ansible.builtin.shell: . /usr/share/postgresql-common/maintscripts-functions && set_system_locale && /usr/bin/pg_createcluster -u postgres {{ pg_ver }} main
  args:
    creates: /etc/postgresql/{{ pg_ver }}/
  when: ansible_facts.os_family == 'Debian'

- name: Initialize postgres (Suse)
  ansible.builtin.service: name=postgresql state=stopped
  when: ansible_facts.os_family == 'Suse'

- name: Pause between stop and start postgresql
  ansible.builtin.pause:
    seconds: 5
  when: ansible_facts.os_family == 'Suse'

- name: Make installable on Arch
  community.general.ini_file:
    path: /usr/lib/systemd/system/postgresql.service
    section: Service
    option: "{{ item }}"
    state: absent
  loop:
    - PrivateTmp
    - ProtectHome
    - ProtectSystem
    - NoNewPrivileges
    - ProtectControlGroups
    - ProtectKernelModules
    - ProtectKernelTunables
    - PrivateDevices
    - RestrictAddressFamilies
    - RestrictNamespaces
    - RestrictRealtime
    - SystemCallArchitectures
  when: ansible_facts.distribution == 'Archlinux'

- name: Make installable on Arch
  ansible.builtin.systemd:
    daemon_reload: true
  when: ansible_facts.distribution == 'Archlinux'

- name: Initialize postgres (Suse)
  ansible.builtin.service: name=postgresql state=started
  when: ansible_facts.os_family == 'Suse'

- name: Copy pg_hba into place
  ansible.builtin.template:
    src: files/pg_hba.conf
    dest: '{{ pg_hba_location }}'
    owner: '{{ pg_user }}'
    group: '{{ pg_group }}'
    mode: '0644'

- name: Generate locales (Debian)
  locale_gen:
    name: '{{ item }}'
    state: present
  with_items:
    - pt_BR
    - es_ES
  when: ansible_facts.os_family == 'Debian'

- block:
    - name: Install langpacks (RHEL8)
      ansible.builtin.dnf:
        name:
          - glibc-langpack-es
          - glibc-langpack-pt
          - glibc-all-langpacks
        state: present
      when: ansible_facts.distribution_major_version is version('8', '>=')

    - name: Check if locales need to be generated (RedHat)
      ansible.builtin.shell: localedef --list-archive | grep -a -q '^{{ locale }}$'
      register: locale_present
      ignore_errors: true
      with_items:
        - es_ES
        - pt_BR
      loop_control:
        loop_var: locale

    - name: Reinstall internationalization files
      ansible.builtin.shell: yum -y reinstall glibc-common || yum -y install glibc-common
      when: locale_present is failed

    - name: Generate locale (RedHat)
      ansible.builtin.command: localedef -f ISO-8859-1 -i {{ item.locale }} {{ item.locale }}
      when: item is failed
      with_items: '{{ locale_present.results }}'
  when: ansible_facts.os_family == 'RedHat' and ansible_facts.distribution != 'Fedora'

- name: Install glibc langpacks (Fedora >= 24)
  ansible.builtin.package:
    name: '{{ item }}'
    state: latest
  with_items:
    - glibc-langpack-es
    - glibc-langpack-pt
  when: ansible_facts.distribution == 'Fedora' and ansible_facts.distribution_major_version is version('24', '>=')

- name: enable postgresql service (FreeBSD)
  ansible.builtin.lineinfile:
    path: /etc/rc.conf
    line: postgresql_enable="YES"
  when: ansible_facts.os_family == "FreeBSD"

- name: start postgresql service
  ansible.builtin.service: name={{ postgresql_service }} state=started

- name: Pause between start and stop
  ansible.builtin.pause:
    seconds: 5

- name: Kill all postgres processes
  ansible.builtin.shell: 'pkill -u {{ pg_user }}'
  become: true
  when: ansible_facts.distribution == 'CentOS' and ansible_facts.distribution_major_version == '8'
  ignore_errors: true
  register: terminate

- name: Stop postgresql service
  ansible.builtin.service: name={{ postgresql_service }} state=stopped
  when: terminate is not succeeded

- name: Pause between stop and start
  ansible.builtin.pause:
    seconds: 5

- name: Start postgresql service
  ansible.builtin.service: name={{ postgresql_service }} state=started

- name: copy control file for dummy ext
  ansible.builtin.copy:
    src: dummy.control
    dest: /usr/share/postgresql/{{ pg_ver }}/extension/dummy.control
    mode: '0444'
  when: ansible_facts.os_family == 'Debian'

- name: copy version files for dummy ext
  ansible.builtin.copy:
    src: '{{ item }}'
    dest: /usr/share/postgresql/{{ pg_ver }}/extension/{{ item }}
    mode: '0444'
  with_items:
    - dummy--1.0.sql
    - dummy--2.0.sql
    - dummy--3.0.sql
  when: ansible_facts.os_family == 'Debian'

- name: add update paths
  ansible.builtin.file:
    path: /usr/share/postgresql/{{ pg_ver }}/extension/{{ item }}
    mode: '0444'
    state: touch
  with_items:
    - dummy--1.0--2.0.sql
    - dummy--2.0--3.0.sql
  when: ansible_facts.os_family == 'Debian'

- name: Get PostgreSQL version
  become_user: '{{ pg_user }}'
  become: true
  ansible.builtin.shell: echo 'SHOW SERVER_VERSION' | psql --tuples-only --no-align --dbname postgres
  register: postgres_version_resp

- name: Print PostgreSQL server version
  ansible.builtin.debug:
    msg: '{{ postgres_version_resp.stdout }}'
