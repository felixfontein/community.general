- name: create random string
  ansible.builtin.set_fact:
    zone_name: "{{ 65535 | random | string }}.ansible.example.com"

- name: create zone with incorrect API key
  community.general.memset_zone:
    api_key: "wa9aerahhie0eekee9iaphoorovooyia"
    state: present
    name: "{{ zone_name }}"
    ttl: 300
  ignore_errors: true
  register: result

- name: check API response with invalid API key
  ansible.builtin.assert:
    that:
      - "'Memset API returned a 403 response (ApiErrorForbidden, Bad api_key)' in result.msg"
      - result is not successful

- name: test creating zone
  community.general.memset_zone:
    api_key: "{{ api_key }}"
    state: present
    name: "{{ zone_name }}"
    ttl: 300
  check_mode: true
  register: result

- name: check if the zone would be created
  ansible.builtin.assert:
    that:
      - result is changed
      - result is successful

- name: create zone
  community.general.memset_zone:
    api_key: "{{ api_key }}"
    state: present
    name: "{{ zone_name }}"
    ttl: 300
  register: result

- name: create the zone
  ansible.builtin.assert:
    that:
      - result is changed
      - result is successful

- name: create duplicate zone
  community.general.memset_zone:
    api_key: "{{ api_key }}"
    state: present
    name: "{{ zone_name }}"
    ttl: 300
  register: result

- name: ensure we can't create duplicate zones
  ansible.builtin.assert:
    that:
      - result is not changed

- name: test deleting zone
  community.general.memset_zone:
    api_key: "{{ api_key }}"
    state: absent
    name: "{{ zone_name }}"
  check_mode: true
  register: result

- name: check if the zone would be deleted
  ansible.builtin.assert:
    that:
      - result is changed
      - result is successful

- name: delete empty zone
  community.general.memset_zone:
    api_key: "{{ api_key }}"
    state: absent
    name: "{{ zone_name }}"
    force: false
  register: result

- name: delete the zone
  ansible.builtin.assert:
    that:
      - result is changed
      - result is successful

- name: create zone for deletion test
  community.general.memset_zone:
    api_key: "{{ api_key }}"
    state: present
    name: "{{ zone_name }}"
  register: result

- name: ensure we can't create duplicate zones
  ansible.builtin.assert:
    that:
      - result is changed
      - result is successful

- name: delete zone with force
  community.general.memset_zone:
    api_key: "{{ api_key }}"
    state: absent
    name: "{{ zone_name }}"
    force: true
  register: result

- name: ensure force is respected
  ansible.builtin.assert:
    that:
      - result is changed
      - result is successful
